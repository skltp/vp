namespace: ntjp

deployment:
  name: vp
  elasticGrokFilter: vp
  replicaCount: 2
  environment:
    name: dev
    domain: ntjp.se
  resources: {} # The no-op curly-braces can optionally replace below sub-resources.
  topologySpreadConstraints:
    - labelSelector:
        matchLabels:
          app: vp
      maxSkew: 2
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule

skltp:
  instanceId: default_instance
  instanceName: SKLTP-DEFAULT
  maxReceiveLength: "52428800"
  useRoutingHistory: true
  urls:
    hsaResetCache: "http://0.0.0.0:24000/resethsacache"
    httpRoute: "http://0.0.0.0:8080/vp"
    httpsRoute: "https://0.0.0.0:20000/vp"
    resetCache: "http://0.0.0.0:23000/resetcache"
    status: "http://0.0.0.0:8080/status"

memoryLoggerPeriodSeconds: 1800

propagateCorrelationIdForHttps: true

server:
  forwardHeadersStrategy: NONE
  port: "8089"
  undertow:
    accesslogDir: "{{ tpl .Values.paths.log . }}"
    accesslogEnabled: false
    accesslogPattern: common
    accesslogPrefix: access_log
    accesslogRotate: true
    accesslogSuffix: .log

producer:
  httpKeepalive: true
  httpWorkers: 0
  httpsKeepalive: true
  httpsWorkers: 0

takcache:
  endpointAddress: "http://tak-services-svc:8080/tak-services/SokVagvalsInfo/v2"
  persistentFileName: "{{ tpl .Values.paths.data . }}/localCache"

hsacache:
  fileName: hsaunits.zip
  fileUrl: "https://wstest.hsa.sjunet.org/hsafileservice/informationlist/hsaunits.zip"
  caCert: /opt/cert/ca.crt
  tlsCert: /opt/cert/tls.crt
  tlsKey: /opt/cert/tls.key
  resetLabelSelector: app=vp
  resetUrlFormat: "http://%s:24000/resethsacache"
  fileAllowableDiff: "100000"
  sendAlertMail: "false"

messageLoggerMethod: ecs
throwVp013WhenOriginalconsumerNotAllowed: false
timeoutJsonFileDefaultTjanstekontraktName: default_timeouts
vagvalrouterDefaultRoutingAddressDelimiter: "#"

javaOpts:
  jmx:
    enabled: true
    port: 8084
    localOnly: false
    authenticate: false
    ssl: false
  jvm:
    minHeap: 512m
    maxHeap: 1536m
    maxRamPercentage: 65
  systemProperties:
    fileEncoding: UTF-8
    userCountry: SE
    userLanguage: sv
    springProfilesActive: custom
    log4j2FormatMsgNoLookups: true

defaultRouting:
  allowedContracts:
    - urn:riv:ehr:accesscontrol:AssertCareEngagementResponder:1
    - urn:riv:insuranceprocess:healthreporting:ReceiveMedicalCertificateQuestionResponder:1
    - urn:riv:insuranceprocess:healthreporting:ReceiveMedicalCertificateAnswerResponder:1

headers:
  requestHeadersToRemove:
    - x-vp.*
    - PEER_CERTIFICATES
    - X-Forwarded.*
    - MULE_.*
    - X-MULE_.*
    - Connection
    - accept-encoding
    - X-Forwarded-Tls-Client-Cert
  forwardedHeaderAuthCert: X-Forwarded-Tls-Client-Cert

management:
  endpointsWebExposureInclude:
    - health
    - metrics
    - prometheus
  endpointPrometheusEnabled: true

senderIdAllowedList:
  - TSTNMT2321000156-B02

container:
  image:
    name: vp-services-camel
    pullPolicy: Always


hsaCacheCronJob:
  elasticGrokFilter: cronjob
  schedule: "25 1 * * *"
  timeZone: "Europe/Stockholm"
  image:
    name: hsa-cache
    tag: 1.1.0
    pullPolicy: Always
  certSecret: test.esb.ntjp.sjunet.org
  trustSecret: esb-function-cert

ingressroute:
  esbHostName: base.env.url # This should be overridden and set to your environment's base hostname.
  sjunetHostName: base.sjunet.env.url # This should be overridden and set to your environment's base hostname.
  bksVpHostName: base.bks.vp.env.url # This should be overridden and set to your environment's base hostname.
  bksHostName: base.bks.env.url # This should be overridden and set to your environment's base hostname.

ingress:
  enabled: true
  tls:
    secret:
      name: esb-function-cert
    version:
      min: VersionTLS12
      max: VersionTLS13
    mtls:
      clientAuth:
        secretNames:
          - esb-function-cert
        clientAuthType: RequireAndVerifyClientCert

ipWhiteList_http: # Override to specify proxy ip(s)
  sourceRange:
    - 10.0.0.0/8
  ipStrategy:
    depth: 1

ipWhiteList_liveness: # Override to specify loadbalancer ip(s)
  sourceRange:
    - 10.0.0.0/8
  ipStrategy:
    depth: 1

ipWhiteList_direct: # Override to restrict direct https access
  sourceRange:
    - 0.0.0.0/0

ipWhiteList_vp:
  prefixes:
    - 127.0.0.1
    - '10.'

service:
  name: vp
  type: ClusterIP
  port: 8080

paths:
  base: /etc/vp
  data: "/var/run/vp/data"
  hsafiles: "/var/run/vp/hsafiles"
  config: "{{ .Values.paths.base }}/config"
  log: /var/log/camel
  certs: "{{ .Values.paths.base }}/certs"

environment:
  config_files:
    - config_map: vp-config-files
      path: "{{ .Values.paths.base }}/config"
      path_relative_to_base: true
      volume_name: default-config-files-from-cm
  variables:
    _default_config_maps:
      - vp-configmap-default
    config_maps:
      # Nothing yet. Override to supply your own maps.
    secrets:
      # Nothing yet. Override to supply your own secrets.

imagePullSecrets:
  - name: regcred

log4j:
  loggers:
    - name: se.skl.tp
      level: INFO
    - name: se.skl.tp.vp.logging.req.in
      level: DEBUG
    - name: se.skl.tp.vp.logging.req.out
      level: "OFF"
    - name: se.skl.tp.vp.logging.resp.in
      level: "OFF"
    - name: se.skl.tp.vp.logging.resp.out
      level: DEBUG
  rootLoggerLevel: WARN

timeoutConfig:
  - tjanstekontrakt: default_timeouts
    routetimeout: 35000
    producertimeout: 35000

tls:
    bundles:
    - name: clientcert
      tlsSecret: esb-function-cert
      truststoreConfigMap: esb-ca
    defaultConfig:
      name: main
      bundle: clientcert
      protocolsInclude:
      - TLSv1.3
      - TLSv1.2
      cipherSuitesInclude:
      - TLS_AES_128_GCM_SHA256
      - TLS_AES_256_GCM_SHA384
      - TLS_CHACHA20_POLY1305_SHA256
      - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
      - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
      - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
      - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
      - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
      - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
      - TLS_DHE_RSA_WITH_AES_256_GCM_SHA384
      - TLS_DHE_DSS_WITH_AES_256_GCM_SHA384
      - TLS_DHE_RSA_WITH_AES_128_GCM_SHA256
      - TLS_DHE_DSS_WITH_AES_128_GCM_SHA256
      - TLS_ECDH_RSA_WITH_AES_256_GCM_SHA384
      - TLS_ECDH_ECDSA_WITH_AES_256_GCM_SHA384
      - TLS_ECDH_RSA_WITH_AES_128_GCM_SHA256
      - TLS_ECDH_ECDSA_WITH_AES_128_GCM_SHA256
      - TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA384
      - TLS_ECDHE_ECDSA_WITH_AES_256_CBC_SHA384
      - TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA256
      - TLS_ECDHE_ECDSA_WITH_AES_128_CBC_SHA256
      - TLS_DHE_RSA_WITH_AES_256_CBC_SHA256
      - TLS_DHE_DSS_WITH_AES_256_CBC_SHA256
      - TLS_DHE_RSA_WITH_AES_128_CBC_SHA256
      - TLS_DHE_DSS_WITH_AES_128_CBC_SHA256
      - TLS_ECDH_RSA_WITH_AES_256_CBC_SHA384
      - TLS_ECDH_ECDSA_WITH_AES_256_CBC_SHA384
      - TLS_ECDH_RSA_WITH_AES_128_CBC_SHA256
      - TLS_ECDH_ECDSA_WITH_AES_128_CBC_SHA256
      - TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA
      - TLS_ECDHE_ECDSA_WITH_AES_256_CBC_SHA
      - TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA
      - TLS_ECDHE_ECDSA_WITH_AES_128_CBC_SHA
      - TLS_DHE_DSS_WITH_AES_256_CBC_SHA
      - TLS_DHE_RSA_WITH_AES_256_CBC_SHA
      - TLS_DHE_RSA_WITH_AES_128_CBC_SHA
      - TLS_DHE_DSS_WITH_AES_128_CBC_SHA
      - TLS_ECDH_RSA_WITH_AES_256_CBC_SHA
      - TLS_ECDH_ECDSA_WITH_AES_256_CBC_SHA
      - TLS_ECDH_RSA_WITH_AES_128_CBC_SHA
    overrides: []

probes:
  startupProbe:
    httpGet:
      path: actuator/health/readiness
      port: actuators
      scheme: HTTP
    initialDelaySeconds: 20
    failureThreshold: 10
    periodSeconds: 4  # 20s + 10 * 4s = 1 minute max startup time
    successThreshold: 1
    timeoutSeconds: 1
  livenessProbe:
    httpGet:
      path: actuator/health/liveness
      port: actuators
      scheme: HTTP
    initialDelaySeconds: 0
    failureThreshold: 3
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 2

resources: {}